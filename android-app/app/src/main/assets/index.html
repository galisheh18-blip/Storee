<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Мои траты</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="monthTitle">Мои траты</h1>
    <button id="monthPicker" class="month-btn" title="Выбрать месяц">📅</button>
  </header>

  <main id="app">
    <!-- Обзор -->
    <section class="tab-page" data-page="overview">
      <div class="summary">
        <div class="summary-card">
          <span class="summary-label">Потрачено</span>
          <span class="summary-value" id="sumSpent">0 ₽</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">Бюджет</span>
          <span class="summary-value" id="sumBudget">0 ₽</span>
        </div>
        <div class="summary-card accent">
          <span class="summary-label">Осталось</span>
          <span class="summary-value" id="sumLeft">0 ₽</span>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="totalBar"></div></div>
        <div class="progress-meta"><span id="totalPct">0%</span><span id="totalHint"></span></div>
      </div>

      <h2 class="section-title">По категориям</h2>
      <div class="table-scroll">
        <table class="cat-table">
          <thead>
            <tr><th>Категория</th><th class="num">Потрачено</th><th class="num">Лимит</th><th class="num">Остаток</th></tr>
          </thead>
          <tbody id="catTableBody"></tbody>
          <tfoot>
            <tr><td>Итого</td><td class="num" id="tfSpent">0</td><td class="num" id="tfLimit">0</td><td class="num" id="tfLeft">0</td></tr>
          </tfoot>
        </table>
      </div>

      <h2 class="section-title">Плановые платежи</h2>
      <div id="plannedNote" class="planned-note"></div>
      <div id="plannedMini" class="planned-mini"></div>
    </section>

    <!-- Траты -->
    <section class="tab-page hidden" data-page="expenses">
      <h2 class="section-title">Добавить трату</h2>
      <form id="expenseForm" class="card form">
        <div class="field">
          <label>Сумма</label>
          <input type="number" id="expAmount" inputmode="decimal" step="0.01" min="0" placeholder="0" required />
        </div>
        <div class="field">
          <label>Категория</label>
          <select id="expCategory" required></select>
        </div>
        <div class="field">
          <label>Комментарий</label>
          <input type="text" id="expNote" placeholder="необязательно" maxlength="60" />
        </div>
        <button type="submit" class="btn primary">Добавить трату</button>
      </form>

      <h2 class="section-title">История</h2>
      <div id="expenseList" class="list"></div>
    </section>

    <!-- Планы -->
    <section class="tab-page hidden" data-page="planned">
      <h2 class="section-title">Плановые платежи</h2>
      <p class="hint">Подписки, ЖКХ, кредиты. Отмечайте оплату за текущий месяц.</p>
      <div id="plannedSummary" class="card planned-summary"></div>
      <div id="plannedList" class="list"></div>
      <form id="plannedForm" class="card form">
        <div class="field">
          <label>Название</label>
          <input type="text" id="plTitle" placeholder="Например: Интернет" maxlength="40" required />
        </div>
        <div class="field">
          <label>Сумма в месяц</label>
          <input type="number" id="plAmount" inputmode="decimal" step="0.01" min="0" placeholder="0" required />
        </div>
        <button type="submit" class="btn primary">Добавить платёж</button>
      </form>
    </section>

    <!-- Категории -->
    <section class="tab-page hidden" data-page="categories">
      <h2 class="section-title">Категории и лимиты</h2>
      <p class="hint">Задайте месячный лимит для каждой категории.</p>
      <div id="categoryList" class="list"></div>
      <form id="categoryForm" class="card form">
        <div class="field">
          <label>Новая категория</label>
          <input type="text" id="catName" placeholder="Например: Спорт" maxlength="30" required />
        </div>
        <div class="field">
          <label>Месячный лимит</label>
          <input type="number" id="catLimit" inputmode="decimal" step="0.01" min="0" placeholder="0" />
        </div>
        <button type="submit" class="btn primary">Добавить категорию</button>
      </form>
      <button id="resetBtn" class="btn ghost danger">Сбросить все данные</button>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-tab="overview"><span>📊</span>Обзор</button>
    <button class="tab" data-tab="expenses"><span>➕</span>Траты</button>
    <button class="tab" data-tab="planned"><span>📆</span>Планы</button>
    <button class="tab" data-tab="categories"><span>🗂️</span>Категории</button>
  </nav>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
