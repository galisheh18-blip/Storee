{% extends 'catalog/base.html' %}

{% block title %}Удаление товара — СпортМагазин{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Вы уверены?</h4>
            </div>
            <div class="card-body">
                <p>Вы собираетесь удалить товар: <strong>{{ object.name }}</strong>.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    <a href="{% url 'catalog:product_list' %}" class="btn btn-outline-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
